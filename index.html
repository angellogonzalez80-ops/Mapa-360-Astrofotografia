<!DOCTYPE html>
<html>
<head>
    <title>Mapa Astrofotografía 360</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    
    <style>
        #map { height: 600px; width: 100%; }
        #panorama { width: 100%; height: 400px; display: none; }
    </style>
</head>
<body>

    <h2>Mis Puntos de Observación</h2>
    <div id="map"></div>
    <div id="panorama"></div> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <script>
        // 1. Inicializar el mapa
        var map = L.map('map').setView([-33.4489, -70.6693], 6); // Coordenadas ejemplo (Chile)

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 2. Definir tus puntos de astrofotografía
        var puntos = [
            {
                lat: -32.729, 
                lng: -70.551, 
                nombre: "Torreon",
                foto360: "https://tour.panoee.net/69b97847e1475b55ee82c630" // Reemplazar por tu link de Panoee
            }
        ];

        // 3. Agregar marcadores al mapa
        puntos.forEach(function(p) {
            var marker = L.marker([p.lat, p.lng]).addTo(map);
            marker.bindPopup("<b>" + p.nombre + "</b><br><button onclick='cargar360(\""+ p.foto360 +"\")'>Ver en 360°</button>");
        });

        // 4. Función para cargar la imagen 360
        function cargar360(url) {
            document.getElementById('panorama').style.display = 'block';
            pannellum.viewer('panorama', {
                "type": "equirectangular",
                "panorama": url,
                "autoLoad": true
            });
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
