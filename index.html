<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Astrofotografía 360 | Angello González</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #0a0a0c; color: white; overflow: hidden; }
        #layout { display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 10px; background: #16161a; text-align: center; border-bottom: 1px solid #333; }
        #map { flex: 1; width: 100%; background: #222; }
        #panorama { height: 40vh; width: 100%; background: #000; border-top: 2px solid #444; }
        h1 { margin: 0; font-size: 1.1rem; color: #eee; }
        /* Estilo para que el popup se lea bien */
        .leaflet-popup-content { color: #000; text-align: center; }
    </style>
</head>
<body>

<div id="layout">
    <div id="header">
        <h1>MAPA DE CIELOS OSCUROS 360°</h1>
    </div>
    <div id="map"></div>
    <div id="panorama"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    // Configuración Inicial
    var map = L.map('map').setView([-32.833, -70.598], 10);

    // CAPAS BASE
    var googleSatelite = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        attribution: 'Google Maps'
    }).addTo(map);

    var openStreetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OSM'
    });

    // CAPA SUPERPUESTA (Contaminación Lumínica)
    var lightPollution = L.tileLayer('https://map1.lightpollutionmap.info/tiles/2022/{z}/{x}/{y}.png', {
        maxZoom: 19,
        opacity: 0.5,
        attribution: 'Light Pollution Map'
    }).addTo(map);

    // CONTROL DE CAPAS (Botón arriba a la derecha)
    var baseMaps = {
        "Satélite (Google)": googleSatelite,
        "Mapa Calles (OSM)": openStreetMap
    };
    var overlayMaps = {
        "Contaminación Lumínica": lightPollution
    };
    L.control.layers(baseMaps, overlayMaps).addTo(map);

    // BUSCADOR (Aparecerá una lupa arriba a la derecha o izquierda)
    L.Control.geocoder({
        defaultMarkGeocode: true,
        placeholder: "Buscar lugar...",
    }).addTo(map);

    // PUNTOS DE TUS FOTOS
    var puntos = [
        {
            lat: -32.712, // Coordenadas aproximadas de Los Andes / Campos Ahumada
        lng: -70.548, 
        nombre: "Curva Campos Ahumada",
        bortle: "3",
        altitud: "1312m",
        foto360: "360 yerko 2 Panorama.jpg" 
        },
        {
            lat: -32.729, 
        lng: -70.551, 
        nombre: "Yerko Panorama",
        bortle: "4",
        altitud: "1196m",
        foto360: "360 curva campos ahumada 2.jpg"
        }
    ];

    puntos.forEach(function(p) {
        var marker = L.marker([p.lat, p.lng]).addTo(map);
        marker.bindPopup(`
            <strong>${p.nombre}</strong><br>
            Bortle: ${p.bortle}<br>
            <button onclick="cargar360('${p.archivo}')" style="margin-top:8px; cursor:pointer;">VER 360°</button>
        `);
    });

    // VISOR 360
    var viewer = null;
    function cargar360(img) {
        if (viewer) { viewer.destroy(); }
        viewer = pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": img, 
            "autoLoad": true,
            "compass": true
        });
    }

    // Cargar la primera al inicio
    window.onload = function() {
        if(puntos.length > 0) cargar360(puntos[0].archivo);
    };
</script>

</body>
</html>
